# Benchmark override: isolate the GLiNER2-large NER layer.
#
# Disables every regex-layer IPI so the Rust service runs ONLY its NER
# (gliner-large) layer — the apples-to-apples counterpart of the Python
# "isolated GLINER2 (privacy-filter)" arm in
# Gliner2VsGlinerRustVsMinistralBenchmarkIT. The classification tier is already
# empty in the baseline, so after this the active scope is NER-only.
#
# Consequence (intended): gliner-large then only covers its configured NER
# labels (username, national id, account id, medical record number, health
# insurance number, password). Regex-typed PII (IBAN, phone, card, IP, AVS, …)
# is NOT detected by gliner-large alone — that is what "uniquement gliner-large
# actif" means.

[meta]
name = "ner-only-bench"
base = "nlpd-client-aligned"
description = "Disable all regex-layer IPIs to isolate the gliner-large NER layer for benchmarking"

[[disable]]
ids = [
  "AVS_NUMBER",
  "SOCIALNUM",
  "IBAN_CODE",
  "BIC_SWIFT",
  "CREDIT_CARD_NUMBER",
  "CREDIT_CARD_ISSUER",
  "CVV",
  "PIN",
  "AMOUNT",
  "CURRENCY_CODE",
  "PHONE_NUMBER",
  "IP_ADDRESS",
  "MAC_ADDRESS",
  "IMEI",
  "VEHICLE_VIN",
  "VEHICLE_REGISTRATION",
  "DEVICE_ID",
  "PASSWORD",
  "API_KEY",
  "SESSION_ID",
  "CRYPTO",
]
reason = "Benchmark: isolate the gliner-large NER layer (regex layer disabled)"
