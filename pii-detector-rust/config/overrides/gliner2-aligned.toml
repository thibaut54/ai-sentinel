# Benchmark override: align gliner-large's NER label set with the Python
# GLINER2 (privacy-filter) schema for a fair MODEL-vs-MODEL comparison.
#
# - Disables every regex-layer IPI (so detection is the gliner-large model only,
#   not regex+validators).
# - Adds one NER IPI per in-scope GLINER2 label NOT already covered by the
#   baseline NER (username / national_id / password / account_id stay from the
#   baseline). ner_label + ner_description + threshold mirror the GLINER2 seed
#   (data-improved-gliner2-presidio-regex.sql) so the ONLY variable between the
#   two arms is the model (gliner2-large-v1 vs gliner2-privacy-filter-PII-multi).
#
# Used by Gliner2VsGlinerRustVsMinistralBenchmarkIT for the gliner-large arm.
# NOTE: this deliberately drops the regex checksum validators (Luhn, AVS mod11,
# IBAN, …), so structured types (IBAN/card/IP) are detected semantically — that
# is the point of the comparison.

[meta]
name = "gliner2-aligned-bench"
base = "nlpd-client-aligned"
description = "Disable regex layer; give gliner-large the GLINER2 in-scope NER label schema"

[[disable]]
ids = [
  "AVS_NUMBER", "SOCIALNUM", "IBAN_CODE", "BIC_SWIFT", "CREDIT_CARD_NUMBER",
  "CREDIT_CARD_ISSUER", "CVV", "PIN", "AMOUNT", "CURRENCY_CODE", "PHONE_NUMBER",
  "IP_ADDRESS", "MAC_ADDRESS", "IMEI", "VEHICLE_VIN", "VEHICLE_REGISTRATION",
  "DEVICE_ID", "PASSWORD", "API_KEY", "SESSION_ID", "CRYPTO",
]
reason = "Benchmark: model-only detection (regex layer off)"

# --- GLINER2 in-scope labels added as NER (id = canonical concept) -----------
# identifiant_officiel (government / tax)
[[custom_ipi]]
id = "GOVERNMENT_ID"
display_fr = "Identifiant officiel"
display_en = "Government ID"
category = "identifiant_officiel"
severity = "high"
layer = "ner"
threshold = 0.50
ner_label = "government_id"
ner_description = "numero d'identification delivre par une autorite publique"

