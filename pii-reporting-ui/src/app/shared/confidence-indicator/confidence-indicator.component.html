<div class="confidence-indicator">
  <meter [value]="percentage()" min="0" max="100" class="confidence-meter-sr">
    {{ percentage() }}%
  </meter>
  <div class="confidence-bar" aria-hidden="true">
    <div class="confidence-bar-fill"
         [class]="barClass()"
         [style.width.%]="percentage()">
    </div>
  </div>
  <span class="confidence-pct" [class]="pctClass()" aria-hidden="true">
    {{ percentage() }}%
  </span>
</div>
