<div class="scan-actions-group">
  <p-button type="button"
            icon="pi pi-play"
            (click)="onStart()"
            (keydown.enter)="onStart()"
            [disabled]="!canStartScan()"
            [pTooltip]="(selectedCount() > 0 ? ('dashboard.actions.scanSelected' | transloco: { count: selectedCount() }) : ('dashboard.actions.startScan' | transloco))"
            tooltipPosition="bottom"
            [attr.data-testid]="testIds()?.buttons?.startScan"
            [ariaLabel]="(selectedCount() > 0 ? ('dashboard.actions.scanSelected' | transloco: { count: selectedCount() }) : ('dashboard.actions.startScan' | transloco))" />
  <p-button type="button"
            icon="pi pi-pause"
            (click)="pauseScan.emit()"
            (keydown.enter)="pauseScan.emit()"
            [disabled]="!isStreaming()"
            [pTooltip]="'dashboard.actions.pauseScan' | transloco"
            tooltipPosition="bottom"
            [attr.data-testid]="testIds()?.buttons?.pauseScan"
            [ariaLabel]="'dashboard.actions.pauseScan' | transloco" />
  @if (showResume()) {
    <p-button type="button"
              icon="pi pi-forward"
              (click)="resumeScan.emit()"
              (keydown.enter)="resumeScan.emit()"
              [disabled]="!canResumeScan()"
              [pTooltip]="'dashboard.actions.resumeScan' | transloco"
              tooltipPosition="bottom"
              [attr.data-testid]="testIds()?.buttons?.resumeScan"
              [ariaLabel]="'dashboard.actions.resumeScan' | transloco" />
  }
</div>
