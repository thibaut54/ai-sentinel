@if (showBanner()) {
  <div class="source-config-banner" role="alert">
    <i class="pi pi-exclamation-triangle"></i>
    <span class="banner-message">
      {{ 'dashboard.notifications.configMissing.message' | transloco: { source: sourceLabel() } }}
    </span>
    <button pButton
            type="button"
            class="p-button-raised p-button-sm"
            (click)="onOpenSettings()"
            (keydown.enter)="onOpenSettings()"
            (keydown.space)="$event.preventDefault(); onOpenSettings()"
            [attr.data-testid]="'configure-button'">
      {{ 'dashboard.notifications.configMissing.settingsButton' | transloco }}
    </button>
    <button pButton
            type="button"
            class="p-button-text p-button-sm"
            icon="pi pi-times"
            (click)="onDismiss()"
            (keydown.enter)="onDismiss()"
            (keydown.space)="$event.preventDefault(); onDismiss()"
            [attr.aria-label]="'dashboard.notifications.configMissing.closeAriaLabel' | transloco"
            [attr.data-testid]="'dismiss-button'">
    </button>
  </div>
}
