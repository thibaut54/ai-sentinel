<p-progressBar [value]="progressPercent()" [showValue]="false"
             [style]="{'height':'6px'}"
             [styleClass]="(progressPercent() === 100 ? 'scan-progress-completed' : '') + ' ' + (isRunningAndNotComplete() ? 'scan-progress-running' : (isPaused() ? 'scan-progress-paused' : ''))"></p-progressBar>
