<p-toast key="scan-errors" position="top-right" [baseZIndex]="5000"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="app-shell">
  <!-- Top bar -->
  <app-header (openSettings)="openSettingsDialog()" />

  <!-- Source tabs -->
  <p-tabs [value]="activeSourceId()">
    <p-tablist>
      <p-tab value="confluence">
        <i class="pi pi-globe tab-icon"></i>
        <span>{{ 'dashboard.sources.confluence' | transloco }}</span>
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="confluence">
        <app-confluence-dashboard (openSettings)="openSettingsDialog($event)" />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>

  <!-- Settings Dialog -->
  <p-dialog [(visible)]="showSettingsDialog"
            [modal]="true"
            [closable]="true"
            [dismissableMask]="true"
            [maximizable]="true"
            [draggable]="false"
            [resizable]="false"
            [style]="{width: '75vw', height: '95vh'}"
            styleClass="settings-fullscreen-dialog"
            [header]="'settings.title' | transloco"
            (onHide)="onSettingsDialogHide()">
    <app-pii-settings [dialogMode]="true"
                      [initialTab]="settingsInitialTab()"
                      (closeDialog)="closeSettingsDialog()"
                      (settingsSaved)="onSettingsSaved()">
    </app-pii-settings>
  </p-dialog>
</div>
