<p-toast key="scan-errors" position="top-right" [baseZIndex]="5000"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="app-shell">
  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img ngSrc="assets/softcom_logo_1.png" alt="Softcom Logo" class="app-logo" height="696" width="696" />
      <h1 class="app-title">{{ 'common.appTitle' | transloco }}</h1>
    </div>
    <div class="top-bar-right">
      <p-button icon="pi pi-cog"
                [label]="'dashboard.actions.settings' | transloco"
                styleClass="header-settings-btn"
                (click)="openSettingsDialog()"
                (keydown.enter)="openSettingsDialog()"
                [ariaLabel]="'dashboard.actions.settings' | transloco" />
      <app-language-selector />
    </div>
  </header>

  <!-- Source tabs -->
  <p-tabs [value]="activeSourceId()">
    <p-tablist>
      <p-tab value="confluence">
        <i class="pi pi-globe tab-icon"></i>
        <span>Confluence</span>
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="confluence">
        <app-confluence-dashboard (openSettings)="openSettingsDialog($event)" />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>

  <!-- Settings Dialog -->
  <p-dialog [(visible)]="showSettingsDialog"
            [modal]="true"
            [closable]="true"
            [dismissableMask]="true"
            [maximizable]="true"
            [draggable]="false"
            [resizable]="false"
            [style]="{width: '95vw', height: '95vh'}"
            styleClass="settings-fullscreen-dialog"
            [header]="'settings.title' | transloco">
    <app-pii-settings [dialogMode]="true"
                      [initialTab]="settingsInitialTab()"
                      (closeDialog)="closeSettingsDialog()">
    </app-pii-settings>
  </p-dialog>
</div>
