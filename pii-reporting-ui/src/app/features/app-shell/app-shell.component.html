<p-toast key="scan-errors" position="top-right" [baseZIndex]="5000"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="app-shell">
  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img ngSrc="assets/softcom_logo_1.png" alt="Softcom Logo" class="app-logo" height="696" width="696" />
      <h1 class="app-title">{{ 'common.appTitle' | transloco }}</h1>
    </div>
    <div class="top-bar-right">
      <p-button icon="pi pi-cog"
                [text]="true"
                [rounded]="true"
                (click)="openSettingsDialog()"
                (keydown.enter)="openSettingsDialog()"
                [pTooltip]="'dashboard.actions.settings' | transloco"
                tooltipPosition="bottom"
                [ariaLabel]="'dashboard.actions.settings' | transloco" />
      <app-language-selector />
    </div>
  </header>

  <!-- Source tabs -->
  <p-tabs [value]="activeSourceId()" (valueChange)="onSourceChange($event)">
    <p-tablist>
      @for (source of sources; track source.id) {
        <p-tab [value]="source.id">
          <i [class]="source.icon" class="tab-icon"></i>
          <span>{{ source.labelKey | transloco }}</span>
          <span class="status-dot" [ngClass]="source.status"></span>
        </p-tab>
      }
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="confluence">
        <app-confluence-dashboard (openSettings)="openSettingsDialog($event)" />
      </p-tabpanel>
      <p-tabpanel value="sharepoint">
        <app-source-empty-state [source]="getSource('sharepoint')" (configure)="openSettingsDialog()" />
      </p-tabpanel>
      <p-tabpanel value="database">
        <app-source-empty-state [source]="getSource('database')" (configure)="openSettingsDialog()" />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>

  <!-- Settings Dialog -->
  <p-dialog [(visible)]="showSettingsDialog"
            [modal]="true"
            [closable]="true"
            [dismissableMask]="true"
            [maximizable]="true"
            [draggable]="false"
            [resizable]="false"
            [style]="{width: '95vw', height: '95vh'}"
            styleClass="settings-fullscreen-dialog"
            [header]="'settings.title' | transloco">
    <app-pii-settings [dialogMode]="true"
                      [initialTab]="settingsInitialTab()"
                      (closeDialog)="closeSettingsDialog()">
    </app-pii-settings>
  </p-dialog>
</div>
