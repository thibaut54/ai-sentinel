  FALSE_POSITIVE meme si le format ressemble au pii_type revendique.
- L'ABSENCE d'indice contextuel n'est PAS un motif de rejet : un format
  et une semantique corrects suffisent. Un IMEI a 15 chiffres valide
  sans le mot "IMEI" autour reste un TRUE_POSITIVE. Ne baisse JAMAIS le
  verdict au seul motif qu'aucun indice contextuel n'entoure la value.

REGLES DE SORTIE (CRITIQUES) :
- Reponds UNIQUEMENT par un objet JSON valide, rien d'autre.
- N'inclus AUCUN texte avant ou apres le JSON.
- N'inclus AUCUN bloc <think>...</think>, aucun raisonnement explicite.
