# Regex Pattern Configuration for PII Detection
# These patterns are used by RegexDetector for deterministic PII detection

[model]
model_id = "regex-detector"
# Note: Enable/disable via detection-settings.toml [detection] regex_detection_enabled
priority = 2  # High priority - executes after ML models

# Detection strategy
# - "standalone": Regex results are independent
# - "validation": Regex validates/enhances ML results
# - "complement": Regex complements ML (default)
strategy = "complement"

# ============================================================================
# REGEX PATTERNS
#
# Scope: only formats where this detector adds value over Microsoft Presidio.
# Presidio already ships robust recognizers for IP_ADDRESS, MAC_ADDRESS,
# CREDIT_CARD and PHONE_NUMBER (the latter via the phonenumbers library), so
# those are intentionally NOT duplicated here to avoid cross-detector noise.
# What remains is credentials/tokens (no Presidio equivalent) and the
# FR/CH/BE national identifiers (no Presidio recognizer), each hardened with a
# checksum validator to keep precision high.
# ============================================================================

[patterns.github_token]
type = "API_KEY"
pattern = 'gh[pousr]_[A-Za-z0-9_]{36,255}'
description = "GitHub API tokens (ghp_, gho_, ghu_, ghs_, ghr_)"
score = 0.99
priority = "high"

[patterns.aws_access_key]
type = "API_KEY"
pattern = 'AKIA[0-9A-Z]{16}'
description = "AWS Access Keys (AKIA prefix + 16 chars)"
score = 0.99
priority = "high"

[patterns.jwt_token]
type = "API_KEY"
pattern = 'eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'
description = "JWT tokens (3 base64url parts separated by dots)"
score = 0.95
priority = "medium"

[patterns.ssn_france]
type = "SOCIALNUM"
pattern = '\b[12][\s.]?\d{2}[\s.]?(?:0[1-9]|1[0-2])[\s.]?(?:\d{2}|2[abAB])[\s.]?\d{3}[\s.]?\d{3}[\s.]?\d{2}\b'
description = "French Social Security Number (INSEE/NIR, optional separators, Corsica 2A/2B); precision comes from the mod-97 control key"
score = 0.92
priority = "medium"
country = "FR"
requires_validation = true
validation_method = "insee_key"

[patterns.ssn_switzerland]
type = "AVS_NUMBER"
pattern = '\b756\.[0-9]{4}\.[0-9]{4}\.[0-9]{2}\b'
description = "Swiss Social Security Number (AHV format: 756.xxxx.xxxx.xx), validated with the EAN-13 check digit"
score = 0.95
priority = "high"
country = "CH"
requires_validation = true
validation_method = "avs_ean13"

[patterns.ssn_belgium]
type = "SOCIALNUM"
pattern = '\b\d{6}-\d{3}-\d{2}\b'
description = "Belgian National Register Number (YYMMDD-SSS-CC), validated with the mod-97 control number"
score = 0.93
priority = "medium"
country = "BE"
requires_validation = true
validation_method = "be_nrn"

# ============================================================================
# VALIDATION SETTINGS
# ============================================================================

[validation]
# Enable Luhn algorithm validation for credit cards
enable_luhn = true

# Minimum confidence score to keep a detection
min_confidence = 0.70

# Remove detections that overlap with higher priority patterns
remove_overlaps = true