# =============================================================================
# Test fallback PII configuration
# =============================================================================
# Snapshot fidele de la config DB de DEV (postgres / pii_detection_config +
# pii_type_config) au 2026-04-29. Utilise par DatabaseConfigAdapter quand la
# variable d'environnement PII_DETECTOR_TEST_FALLBACK_TOML pointe sur ce
# fichier, ce qui permet de faire tourner le pipeline COMPLET (categories
# multipass + filtres par type) sans Postgres - notamment pour le TI
# scripts/test_pipeline_real_pdf.py.
#
# Pour re-synchroniser depuis la DB : voir scripts/test_pipeline_real_pdf.py
# (commentaire en tete) ou requeter directement pii_detection_config /
# pii_type_config.
# =============================================================================

[detection_config]
# Equivalent de la ligne unique pii_detection_config (id=1)
gliner_enabled = true
presidio_enabled = true
regex_enabled = false
default_threshold = 0.30
nb_of_label_by_pass = 35
llm_validation_enabled = true

# -----------------------------------------------------------------------------
# Per-type configs : equivalent de pii_type_config (1 ligne par tuple
# (pii_type, detector)). Chaque entree expose les memes champs que ceux lus
# par DatabaseConfigAdapter.fetch_pii_type_configs() :
#   pii_type, detector, detector_label, category, enabled, threshold,
#   country_code, severity, is_custom
# -----------------------------------------------------------------------------

