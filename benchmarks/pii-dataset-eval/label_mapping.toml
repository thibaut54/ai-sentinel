# =============================================================================
# [ambiguous] — documented non-1:1 decisions (spec étape 1 "documente les choix
# ambigus"). These are the calls a reviewer should sanity-check.
# =============================================================================
[ambiguous]
account_pin            = "gretelai account_pin -> PIN (OPENMED has a PIN type). Alternative: CARD_CVV. Chose PIN as the literal concept."
ssn_socialnumber       = "gretelai ssn + ai4privacy SOCIALNUMBER -> NATIONAL_ID_NUMBER, merged with REGEX SOCIALNUM so both GLINER2 and REGEX emissions score against the same gold concept."
swift_bic_code         = "EXCLUDED: no enabled detector emits a BIC/SWIFT concept in this seed -> ignore zone (not FN)."
bban                   = "gretelai bban (domestic account no.) -> BANK_ACCOUNT (GLINER2 also emits ACCOUNT_NUMBER, both folded into BANK_ACCOUNT)."
card_concepts          = "payment_card / card_number / CREDIT_CARD / CREDIT_CARD_NUMBER all -> CARD_NUMBER (single canonical card concept). CARD_EXPIRY and CARD_CVV stay distinct."
crypto_concepts        = "BITCOIN/ETHEREUM/LITECOIN + PRESIDIO CRYPTO -> CRYPTO (no dataset gold; only via synthetic fixtures)."
email_person_temporal  = "EMAIL, person names, addresses, dates: EXCLUDED because the master seed disables every detector type for them; counting them would unfairly inflate FN for the as-configured pipeline."
