# =============================================================================
# EXTRACTORS — generative LLM PII extractors evaluated head-to-head (NOT detectors
# of the production pipeline). They return {text,label} entities; we map their
# label -> canonical concept, or "IGNORE" for a concept outside our scoped
# vocabulary (so the extractor is not penalised for finding real but out-of-scope
# PII, symmetric to the dataset ignore zones). Any label absent here defaults to
# IGNORE on the Java side, and unseen labels are logged (no silent drop).
# [extractors._default] applies to every model; add [extractors.<model>] to
# override for a specific model id. Emitted to mappings/extractor_concept_map.json.
# =============================================================================
