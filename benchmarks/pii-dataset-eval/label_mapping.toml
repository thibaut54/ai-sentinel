# =============================================================================
# label_mapping.toml — Versioned label normalization table for the PII benchmark
# =============================================================================
# Spec: my-files/integratoin-test-with-dataset/spec.md (étape 1)
#
# This file is the SINGLE SOURCE OF TRUTH for span-level scoring. It defines:
#   1. [canonical]      — the canonical concept vocabulary we score against.
#   2. [datasets.*.map] — dataset_label -> canonical_concept (what the gold
#                         spans become).
#   3. [datasets.*.exclude] — dataset labels with NO in-scope equivalent. Their
#                         spans become "ignore zones": never counted as FN, and
#                         a detector finding landing on them is NOT a FP either
#                         (the dataset DID mark them PII, just out of our scope).
#   4. [detectors.*]    — detector_emitted_pii_type -> canonical_concept. Needed
#                         because each detector emits a different pii_type for the
#                         same concept (PRESIDIO=IBAN_CODE, GLINER2=IBAN, ...).
#
# `build_datasets.py` consumes this file and emits:
#   - gold/<dataset>.jsonl                (text + canonical spans + ignore spans)
#   - mappings/detector_concept_map.json  (flattened [detectors.*], read by Java)
#
# RULE (spec §"Points d'attention"): the canonical vocabulary = concepts that AT
# LEAST ONE in-scope detector (GLINER2/PRESIDIO/REGEX/OPENMED) has an *enabled*
# pii_type for, in the master seed data-improved-gliner2-presidio-regex.sql.
# A dataset label whose concept no enabled detector can emit is EXCLUDED, so the
# benchmark measures the detectors as actually configured, not an idealized one.
# =============================================================================

schema_version = "1"
seed_reference = "pii-reporting-api/src/test/resources/sql/data-improved-gliner2-presidio-regex.sql"

# -----------------------------------------------------------------------------
# [canonical] — the concepts we score. Value = which enabled detectors can emit
# it (documentation only; the runtime truth is [detectors.*] below).
# -----------------------------------------------------------------------------
[canonical]
# Government / tax IDs
GOVERNMENT_ID          = "GLINER2"
NATIONAL_ID_NUMBER     = "GLINER2, REGEX(SOCIALNUM)"
PASSPORT_NUMBER        = "GLINER2"
DRIVERS_LICENSE_NUMBER = "GLINER2"
LICENSE_NUMBER         = "GLINER2"
TAX_ID                 = "GLINER2"
TAX_NUMBER             = "GLINER2"
# Banking / payment
IBAN                   = "GLINER2, PRESIDIO(IBAN_CODE)"
BANK_ACCOUNT           = "GLINER2(bank_account/account_number), OPENMED"
ROUTING_NUMBER         = "GLINER2"
CARD_NUMBER            = "GLINER2(payment_card/card_number), PRESIDIO(CREDIT_CARD off), REGEX(CREDIT_CARD_NUMBER), OPENMED(CREDIT_CARD)"
CARD_EXPIRY            = "GLINER2 (synthetic-only gold)"
CARD_CVV               = "GLINER2(card_cvv), OPENMED(CVV)"
PIN                    = "OPENMED"
# Digital identity
USERNAME               = "GLINER2"
IP_ADDRESS             = "GLINER2, REGEX"
ACCOUNT_ID             = "GLINER2"
SENSITIVE_ACCOUNT_ID   = "GLINER2 (no dataset gold)"
PHONE_NUMBER           = "REGEX (GLINER2 phone disabled)"
# Secrets / credentials
PASSWORD               = "GLINER2, OPENMED"
SECRET                 = "GLINER2 (synthetic-only gold)"
API_KEY                = "GLINER2, REGEX"
ACCESS_TOKEN           = "GLINER2 (synthetic-only gold)"
RECOVERY_CODE          = "GLINER2 (synthetic-only gold)"
# Concepts emitted by detectors but absent from gretelai/ai4privacy (measured
# only if synthetic fixtures add them; listed so detector findings of these
# types are NOT treated as 'unknown'):
CRYPTO                 = "PRESIDIO, OPENMED(BTC/ETH/LTC)"
MAC_ADDRESS            = "PRESIDIO, REGEX"
MEDICAL_LICENSE        = "PRESIDIO"
IMEI                   = "OPENMED"
VIN                    = "OPENMED"
VEHICLE_REGISTRATION   = "OPENMED"
ACCOUNT_NAME           = "OPENMED"
AVS_NUMBER             = "REGEX (Swiss; no dataset gold)"
NRP                    = "PRESIDIO (out-of-scope concept; findings count as FP unless on an ignore zone)"

# =============================================================================
# DATASETS
# =============================================================================

# -----------------------------------------------------------------------------
# gretelai/synthetic_pii_finance_multilingual
#   pii_spans is a JSON *string* (json.loads) -> list of {start,end,label}.
# -----------------------------------------------------------------------------
[datasets.gretelai]
hf_id        = "gretelai/synthetic_pii_finance_multilingual"
revision     = "7b844d16738527a04264f50214cb426a4cea0897"
split        = "test"
text_field   = "generated_text"
spans_field  = "pii_spans"
spans_format = "json_string"   # value is a JSON string -> [{start,end,label}]
languages    = ["English"]      # restrict to keep offsets BMP-safe & runtime bounded

[datasets.gretelai.map]
iban                       = "IBAN"
bban                       = "BANK_ACCOUNT"
bank_routing_number        = "ROUTING_NUMBER"
credit_card_number         = "CARD_NUMBER"
credit_card_security_code  = "CARD_CVV"
account_pin                = "PIN"
customer_id                = "ACCOUNT_ID"
employee_id                = "ACCOUNT_ID"
api_key                    = "API_KEY"
password                   = "PASSWORD"
ssn                        = "NATIONAL_ID_NUMBER"
passport_number            = "PASSPORT_NUMBER"
driver_license_number      = "DRIVERS_LICENSE_NUMBER"
ipv4                       = "IP_ADDRESS"
ipv6                       = "IP_ADDRESS"
user_name                  = "USERNAME"
phone_number               = "PHONE_NUMBER"

[datasets.gretelai.exclude]
swift_bic_code = "BIC_SWIFT is not emitted by any ENABLED detector (GLINER none, PRESIDIO none, OPENMED BIC disabled) -> ignore zone"
email          = "no enabled detector emits EMAIL in this seed -> ignore zone"
