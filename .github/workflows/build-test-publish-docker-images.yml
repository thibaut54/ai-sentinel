name: CI/CD - Tests and Publish

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag for images (optional)'
        required: false
        default: 'manual'
      build_detector:
        description: 'Build PII Detector'
        required: true
        type: boolean
        default: true
      build_api:
        description: 'Build Reporting API'
        required: true
        type: boolean
        default: true
      build_ui:
        description: 'Build Reporting UI'
        required: true
        type: boolean
        default: true

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Reusable tests workflow - eliminates duplication
  tests:
    uses: ./.github/workflows/run-tests.yml

  # Publication jobs - run in parallel after tests succeed
  build-and-publish-detector:
    name: Build and Publish PII Detector
    runs-on: ubuntu-latest
    needs: [tests]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')) &&
      (github.event.inputs.build_detector != 'false' || github.event_name != 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -A 10 '^\[project\]' pii-detector-service/pyproject.toml | grep '^version = ' | sed 's/version = "\(.*\)"/\1/' | head -1)
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Handle custom tag from workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            CUSTOM_TAG="${{ github.event.inputs.tag }}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-pii-detector:$CUSTOM_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-pii-detector:$VERSION,ghcr.io/$OWNER_LOWER/ai-sentinel-pii-detector:latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            RC_TAG="${{ github.ref_name }}"
            RC_TAG="${RC_TAG#release/v}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-pii-detector:$RC_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-pii-detector:$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./pii-detector-service/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.image_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.description="PII Detector Service - Python/gRPC service for detecting Personal Identifiable Information"
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  build-and-publish-api:
    name: Build and Publish Reporting API
    runs-on: ubuntu-latest
    needs: [tests]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')) &&
      (github.event.inputs.build_api != 'false' || github.event_name != 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -A 2 '<artifactId>ai-sentinel</artifactId>' pii-reporting-api/pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT$//' | sed 's/-RELEASE$//')
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Handle custom tag from workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            CUSTOM_TAG="${{ github.event.inputs.tag }}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-api:$CUSTOM_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-api:$VERSION,ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-api:latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            RC_TAG="${{ github.ref_name }}"
            RC_TAG="${RC_TAG#release/v}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-api:$RC_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-api:$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./pii-reporting-api/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.image_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.description="PII Reporting API - Spring Boot backend for managing PII scan reports"
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  build-and-publish-ui:
    name: Build and Publish Reporting UI
    runs-on: ubuntu-latest
    needs: [tests]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')) &&
      (github.event.inputs.build_ui != 'false' || github.event_name != 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(grep '"version":' pii-reporting-ui/package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Handle custom tag from workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            CUSTOM_TAG="${{ github.event.inputs.tag }}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-ui:$CUSTOM_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-ui:$VERSION,ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-ui:latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            RC_TAG="${{ github.ref_name }}"
            RC_TAG="${RC_TAG#release/v}"
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-ui:$RC_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "image_tags=ghcr.io/$OWNER_LOWER/ai-sentinel-reporting-ui:$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./pii-reporting-ui
          file: ./pii-reporting-ui/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.image_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.description="PII Reporting UI - Angular frontend for visualizing PII scan results"
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
