
services:

  doccano-backend:
    image: doccano/doccano:backend
    container_name: doccano-backend
    volumes:
      - doccano_static:/backend/staticfiles
      - doccano_media:/backend/media
      - doccano_tmp:/backend/filepond-temp-uploads
    environment:
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@doccano-rabbitmq"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@doccano-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      ALLOW_SIGNUP: "False"
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: "config.settings.production"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}"
    depends_on:
      - doccano-postgres
      - doccano-rabbitmq
    networks:
      doccano-backend-net:
      doccano-frontend-net:
        aliases:
          - backend

  doccano-celery:
    image: doccano/doccano:backend
    container_name: doccano-celery
    volumes:
      - doccano_media:/backend/media
      - doccano_tmp:/backend/filepond-temp-uploads
    entrypoint: ["/opt/bin/prod-celery.sh"]
    environment:
      PYTHONUNBUFFERED: "1"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@doccano-rabbitmq"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@doccano-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DJANGO_SETTINGS_MODULE: "config.settings.production"
    depends_on:
      - doccano-postgres
      - doccano-rabbitmq
    networks:
      - doccano-backend-net

  doccano-flower:
    image: doccano/doccano:backend
    container_name: doccano-flower
    entrypoint: ["/opt/bin/prod-flower.sh"]
    environment:
      PYTHONUNBUFFERED: "1"
      CELERY_BROKER_URL: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@doccano-rabbitmq"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@doccano-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DJANGO_SETTINGS_MODULE: "config.settings.production"
      FLOWER_BASIC_AUTH: "${FLOWER_BASIC_AUTH}"
    depends_on:
      - doccano-celery
    ports:
      - "5555:5555"
    networks:
      - doccano-backend-net
      - doccano-frontend-net

  doccano-rabbitmq:
    image: rabbitmq:3.10.7-alpine
    container_name: doccano-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS}"
    ports:
      - "5672:5672"
    networks:
      - doccano-backend-net

  doccano-nginx:
    image: doccano/doccano:frontend
    container_name: doccano-nginx
    command: >
      /bin/sh -c
      "envsubst '
      $${WORKER_PROCESSES}
      '< /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    environment:
      API_URL: "http://doccano-backend:8000"
      GOOGLE_TRACKING_ID: ""
      WORKER_PROCESSES: "auto"
    volumes:
      - doccano_static:/static
      - doccano_media:/media
    ports:
      - "${DOCCANO_HTTP_PORT:-8000}:8080"
    depends_on:
      - doccano-backend
    networks:
      - doccano-frontend-net

  doccano-postgres:
    image: postgres:13.3-alpine
    container_name: doccano-postgres
    volumes:
      - doccano_postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    networks:
      - doccano-backend-net

  doccano-bootstrapper:
    image: alpine:3.19
    container_name: doccano-bootstrapper
    restart: "no"
    depends_on:
      - doccano-backend
    environment:
      DOCCANO_URL: "http://doccano-backend:8000"
      DOCCANO_USERNAME: "${ADMIN_USERNAME}"
      DOCCANO_PASSWORD: "${ADMIN_PASSWORD}"
      DOCCANO_PROJECT_NAME: "ai-sentinel-pii-eval"
    volumes:
      - ./doccano-bootstrap.sh:/bootstrap/doccano-bootstrap.sh:ro
      - ./doccano-labels.json:/bootstrap/doccano-labels.json:ro
    entrypoint: ["/bin/sh", "/bootstrap/doccano-bootstrap.sh"]
    networks:
      - doccano-backend-net

volumes:
  doccano_postgres_data:
  doccano_static:
  doccano_media:
  doccano_tmp:

networks:
  doccano-backend-net:
  doccano-frontend-net:
