spring:
  main:
    web-application-type: servlet
  autoconfigure:
    exclude:
      - com.linecorp.armeria.spring.ArmeriaAutoConfiguration
  application:
    name: ai-sentinel
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:ai-sentinel}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
# These values are only for test context bootstrapping

# Keep Armeria as default client in tests; use loopback host
pii-detector:
  client: armeria
  host: 127.0.0.1
  port: 50051
  default-threshold: 0.5
  connection-timeout-ms: 2000
  request-timeout-ms: 5000

# Avoid port conflicts during tests
server:
  port: 0
  servlet:
    context-path: /ai-sentinel

# Ensure Armeria internal services bind to a random port to avoid clashes during tests
armeria:
  internal-services:
    port: 0

# Jira Cloud integration test settings
jira:
  cloud:
    base-url: ${JIRA_CLOUD_BASE_URL}
    email: ${JIRA_CLOUD_EMAIL}
    api-token: ${JIRA_CLOUD_API_TOKEN}
    project-key: ${JIRA_CLOUD_PROJECT_KEY:}
    connect-timeout: ${JIRA_CLOUD_CONNECT_TIMEOUT:10000}
    read-timeout: ${JIRA_CLOUD_READ_TIMEOUT:30000}
    max-retries: ${JIRA_CLOUD_MAX_RETRIES:2}
    issues-limit: ${JIRA_CLOUD_ISSUES_LIMIT:10}
    max-issues: ${JIRA_CLOUD_MAX_ISSUES:50}

# Jira Data Center integration test settings
  datacenter:
    base-url: ${JIRA_DC_BASE_URL}
    username: ${JIRA_DC_USERNAME}
    api-token: ${JIRA_DC_API_TOKEN}
    project-key: ${JIRA_DC_PROJECT_KEY:}
    connect-timeout: ${JIRA_DC_CONNECT_TIMEOUT:10000}
    read-timeout: ${JIRA_DC_READ_TIMEOUT:30000}
    max-retries: ${JIRA_DC_MAX_RETRIES:2}
    issues-limit: ${JIRA_DC_ISSUES_LIMIT:10}
    max-issues: ${JIRA_DC_MAX_ISSUES:50}

# Reduce logging noise during tests
logging:
  level:
    root: WARN
    pro.softcom.aisentinel: INFO
    pro.softcom.aisentinel.infrastructure.pii: INFO
    pro.softcom.aisentinel.infrastructure.confluence: DEBUG
